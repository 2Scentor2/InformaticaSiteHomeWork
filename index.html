<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Scentor OS | Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&display=swap');
        :root { --glow: #00ff41; --bg: #050505; --dim: #003b00; --run: #ff00ea; }
        
        body { background: var(--bg); color: var(--glow); font-family: 'Fira Code', monospace; margin: 0; padding: 20px; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.2; }
        
        #terminal { position: relative; z-index: 2; border: 1px solid var(--dim); height: 90vh; padding: 20px; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; }
        
        .file-entry { cursor: pointer; padding: 8px; display: inline-block; width: fit-content; transition: 0.2s; border-bottom: 1px solid transparent; }
        .file-entry:hover { background: var(--glow); color: #000; }

        .modal { display: none; position: fixed; border: 2px solid var(--glow); background: #000; padding: 20px; box-shadow: 0 0 40px rgba(0,255,65,0.2); }
        #editor-win { top: 10%; left: 10%; width: 75%; height: 65%; z-index: 10; }
        #run-win { top: 20%; left: 20%; width: 55%; height: 50%; z-index: 20; border-color: var(--run); box-shadow: 0 0 40px rgba(255,0,234,0.2); }

        pre { background: #080808; color: #fff; padding: 15px; height: 65%; overflow: auto; border: 1px solid var(--dim); font-size: 14px; white-space: pre-wrap; }
        #run-output { color: var(--glow); font-size: 14px; height: 70%; overflow-y: auto; line-height: 1.5; }
        
        .btn { background: transparent; border: 1px solid var(--glow); color: var(--glow); padding: 10px 20px; cursor: pointer; font-family: inherit; margin-right: 10px; transition: 0.2s; outline: none; }
        .btn:hover { background: var(--glow); color: #000; }

        .cursor { display: inline-block; width: 10px; height: 18px; background: var(--glow); animation: blink 1s infinite; vertical-align: middle; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #run-input-area { margin-top: 10px; border-top: 1px solid #4b0042; padding-top: 10px; display: none; }
        #runtime-input { background: transparent; border: none; color: #fff; font-family: inherit; outline: none; width: 60%; font-size: 16px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>
<script src="data.js"></script>

<div id="terminal">
    <div id="file-link" class="file-entry" onclick="openEditor()">[ SYSTEM_EMPTY: Загрузите data.js ]</div>
    
    <div style="margin-top: auto; padding-top: 10px;">
        <span>root@scentor:~$&nbsp;</span><span class="cursor"></span>
    </div>
</div>

<div id="editor-win" class="modal">
    <h2 id="ed-title" style="margin-top:0; color:var(--glow); border-bottom: 1px solid var(--dim); padding-bottom: 5px;"></h2>
    <pre id="ed-content"></pre>
    <div style="margin-top:20px;">
        <button class="btn" onclick="downloadPy()">[ СКАЧАТЬ .PY ]</button>
        <button class="btn" onclick="startExecution()">[ ЗАПУСТИТЬ ]</button>
        <button class="btn" onclick="closeEditor()" style="color:red; border-color:red;">[ ВЫХОД ]</button>
    </div>
</div>

<div id="run-win" class="modal">
    <h3 style="margin-top:0; color:var(--run); font-size: 14px;">> RUNTIME_MONITOR</h3>
    <div id="run-output"></div>
    
    <div id="run-input-area">
        <span style="color: var(--run);">INPUT_REQUIRED >>&nbsp;</span>
        <input type="text" id="runtime-input" autocomplete="off" autofocus>
    </div>

    <button class="btn" id="close-run-btn" onclick="closeRun()" style="margin-top:15px; border-color: var(--run); color: var(--run);">[ ЗАКРЫТЬ ]</button>
</div>

<script>
    const data = (typeof scriptData !== 'undefined') ? scriptData : null;
    let executionQueue = [];

    if (data) {
        document.getElementById('file-link').textContent = `> ${data.name} // ${data.desc}`;
    }

    function openEditor() {
        if (!data) return;
        document.getElementById('ed-title').textContent = `FILE: ${data.name}`;
        document.getElementById('ed-content').textContent = data.content;
        document.getElementById('editor-win').style.display = 'block';
    }

    function closeEditor() {
        document.getElementById('editor-win').style.display = 'none';
        closeRun();
    }

    function startExecution() {
        if (!data) return;
        const out = document.getElementById('run-output');
        document.getElementById('run-win').style.display = 'block';
        out.innerHTML = "<span style='color:#666'>> Connecting to kernel...</span><br>";

        const lines = data.content.split('\n');
        executionQueue = [];

        lines.forEach(line => {
            const printMatch = line.match(/print\((['"])(.*?)\1\)/);
            const inputMatch = line.match(/input\((['"])(.*?)\1\)/);
            
            if (inputMatch) {
                executionQueue.push({ type: 'input', val: inputMatch[2] });
            } else if (printMatch) {
                executionQueue.push({ type: 'print', val: printMatch[2] });
            }
        });

        processQueue();
    }

    function processQueue() {
        const out = document.getElementById('run-output');
        const inputArea = document.getElementById('run-input-area');

        if (executionQueue.length === 0) {
            out.innerHTML += "<br><span style='color:var(--glow)'>> PROCESS_FINISHED (0)</span>";
            out.scrollTop = out.scrollHeight;
            return;
        }

        const step = executionQueue.shift();

        if (step.type === 'print') {
            out.innerHTML += `<span style='color:#fff'>> ${step.val}</span><br>`;
            out.scrollTop = out.scrollHeight;
            setTimeout(processQueue, 300);
        } else if (step.type === 'input') {
            out.innerHTML += `<span style='color:var(--run)'>> ${step.val}</span> `;
            inputArea.style.display = 'block';
            document.getElementById('runtime-input').focus();
        }
    }

    document.getElementById('runtime-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const val = this.value;
            const out = document.getElementById('run-output');
            out.innerHTML += `<span style="color: #00ff41;">${val}</span><br>`;
            this.value = '';
            document.getElementById('run-input-area').style.display = 'none';
            setTimeout(processQueue, 400);
        }
    });

    function closeRun() {
        document.getElementById('run-win').style.display = 'none';
        document.getElementById('run-input-area').style.display = 'none';
        executionQueue = [];
    }

    function downloadPy() {
        if (!data) return;
        const blob = new Blob([data.content], { type: 'text/x-python' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        let name = data.name.toLowerCase().endsWith('.py') ? data.name : data.name + ".py";
        a.download = name;
        a.click();
    }

    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/14)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00ff41"; ctx.font = "14px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(String.fromCharCode(Math.random()*128), i*14, y*14);
            if (y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
</script>
</body>
</html>
